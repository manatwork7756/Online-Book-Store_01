# ==========================================
# Digital Library System - Application Config
# ==========================================

# Server Port
server.port=8080

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/digital_library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=#Abhino@1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=digitalLibrarySecretKey2024VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# ==========================================
# File Upload Configuration
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# File storage path (books will be stored here)
file.upload-dir=./uploads

# ==========================================
# CORS - Allowed Origins
# ==========================================
allowed.origins=http://localhost:3000

# ==========================================
# Logging
# ==========================================
logging.level.com.digitallibrary=DEBUG
logging.level.org.springframework.security=INFO
